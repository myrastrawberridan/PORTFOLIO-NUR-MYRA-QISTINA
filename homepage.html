<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="css/homepage.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Aralea</div>
    <ul>
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="aboutme.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="myproject.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="theme-switcher">
      <div class="theme-btn dark-blue" onclick="setTheme('')"       title="Dark Blue"></div>
      <div class="theme-btn black"     onclick="setTheme('black')"  title="Black"></div>
      <div class="theme-btn purple"    onclick="setTheme('purple')" title="Purple"></div>
      <div class="theme-btn white"     onclick="setTheme('white')"  title="White"></div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <!-- LEFT -->
    <div class="hero-text">
      <h3>Hi, I'm</h3>
      <h1>Aralea 👋</h1>
      <p class="tagline">Diploma in Computer Science</p>
      <p class="tagline">Aspiring Web Developer</p>
      <p class="description">I build responsive and user-friendly web applications.</p>
      <div class="hero-buttons">
        <a href="myproject.html" class="btn-primary">View Projects</a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="hero-image">
      <div class="profile-pic">
        <img src="images/gambar portfolio myra.jpg" alt="Aralea">
      </div>
      <div class="social-links">
  <a href="https://github.com/myrastrawberridan" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
  <a href="contact.html" title="Email"><i class="fas fa-envelope"></i></a>
    </div>
    </div>

  </section>

  <script src="js/homepage.js"></script>
  <script>
    function setTheme(theme) {
      document.body.className = theme;
      localStorage.setItem('theme', theme);
    }
    const saved = localStorage.getItem('theme');
    if (saved) document.body.className = saved;
  </script>

</body>
</html>
